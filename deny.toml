# When `cargo deny` is executed, the advisories list is used to determine if a
# crate has a security vulnerability, unmaintained status, or has been yanked.

[advisories]
# The URL of the advisory database to use (OVERRIDE: Use RustSec by default)
db-urls = ["https://github.com/rustsec/advisory-db"]
# Version requirements: specify which advisories are errors vs warnings
# The 'version' field specifies the minimum version of cargo-deny required for this config
version = 2
# Lint level for crates with known security vulnerabilities
severity = "deny"
# Warn about unmaintained crates
unmaintained = "warn"
# Warn about yanked crates
yanked = "warn"
# Warn about crates with security notices
notice = "warn"
# A list of advisory IDs to ignore (empty by default)
ignore = [
    # Example: "RUSTSEC-2020-0001",
]

# Licenses configuration
[licenses]
# The confidence threshold for detecting a license from license text.
# Default: 0.8
confidence-threshold = 0.8
# List of explicitly allowed licenses
# See https://spdx.org/licenses/
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
]
# List of explicitly disallowed licenses
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
]
# Lint level for copyleft licenses
copyleft = "deny"
# Blanket approval or denial for OSI-approved or FSF Free/Libre licenses
allow-osi-fsf-free = "either"
# Lint level used when no other predicates are matched
default = "deny"
# The confidence threshold for detecting a license from license text.
# Default: 0.8
unlicensed = "deny"

# Bans configuration
[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "warn"
# Lint level for when a crate version requirement is `*`
wildcards = "warn"
# The graph highlighting used when creating dotgraphs for crates
# with multiple versions
highlight = "all"
# List of explicitly allowed duplicate dependencies
allow = [
    # Example: {name = "ansi_term", version = "=0.11.0"},
]
# List of crates that are explicitly denied
deny = [
    # Example: {name = "rust-crypto", reason = "Use rustcrypto crates instead"},
]
# Skip certain crates during duplicate version checks
skip = [
    # Common transitive dependencies that often have multiple versions
    { name = "wit-bindgen", reason = "Transitive dependency with newer edition parsed by cargo-deny action image" },
]
# Skip the tree root crate during duplicate version checks
skip-tree = []

# Sources configuration
[sources]
# Lint level for what to happen when a crate from a crate registry that is not
# in the allow list is encountered
unknown-registry = "deny"
# Lint level for what to happen when a crate from a git repository that is not
# in the allow list is encountered
unknown-git = "deny"
# List of URLs for allowed crate registries. Defaults to the crates.io index
# if not specified.
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# List of URLs for allowed Git repositories
allow-git = []

[sources.allow-org]
# GitHub organizations to allow
github = []
# GitLab organizations to allow
gitlab = []
# Bitbucket organizations to allow
bitbucket = []
