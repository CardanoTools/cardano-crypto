name: Documentation

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly  # Use nightly for doc coverage

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-docs-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Check documentation coverage
        run: |
          cargo +nightly rustdoc --all-features -- -Z unstable-options --show-coverage | tee doc-coverage.txt
          # Extract coverage percentage
          COVERAGE=$(grep "^[[:space:]]*[0-9]\+\.[0-9]\+% " doc-coverage.txt | tail -1 | awk '{print $1}')
          echo "Documentation coverage: $COVERAGE"
          echo "DOC_COVERAGE=$COVERAGE" >> $GITHUB_ENV
        continue-on-error: true

      - name: Build documentation
        run: |
          cargo +nightly doc --all-features --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings --cfg docsrs"

      - name: Check for broken links
        run: |
          cargo install lychee --locked || true
          if command -v lychee &> /dev/null; then
            lychee --verbose --no-progress './target/doc/**/*.html' --exclude-path 'target/doc/src' || true
          fi
        continue-on-error: true

      - name: Generate documentation metrics
        run: |
          mkdir -p target/doc/metrics
          cat > target/doc/metrics/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Documentation Metrics</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 40px; }
              .metric { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
              .metric h2 { margin-top: 0; }
              .coverage { font-size: 2em; font-weight: bold; color: #28a745; }
            </style>
          </head>
          <body>
            <h1>📊 Documentation Metrics</h1>
            <div class="metric">
              <h2>Documentation Coverage</h2>
              <div class="coverage">${DOC_COVERAGE:-N/A}</div>
            </div>
            <div class="metric">
              <h2>Generated</h2>
              <p>$(date -u +"%Y-%m-%d %H:%M:%S UTC")</p>
            </div>
            <p><a href="../index.html">← Back to Documentation</a></p>
          </body>
          </html>
          EOF
        continue-on-error: true

      - name: Add index redirect
        run: |
          echo '<meta http-equiv="refresh" content="0; url=cardano_crypto/index.html">' > target/doc/index.html

      - name: Remove lock file
        run: rm -f target/doc/.lock

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./target/doc

  deploy-docs:
    name: Deploy Documentation
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-docs
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
