name: Publish to crates.io

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for semver-checks

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-release-

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked

      - name: Check semantic versioning
        run: |
          # Check for breaking changes
          cargo semver-checks check-release || {
            echo "⚠️ Breaking API changes detected!"
            echo "Please ensure version bump is appropriate (major.minor.patch)"
            TAG_VERSION=${GITHUB_REF#refs/tags/v}
            if [[ "$TAG_VERSION" =~ ^[0-9]+\.0\.0$ ]]; then
              echo "✅ Major version bump detected - breaking changes allowed"
            else
              echo "❌ Breaking changes require a major version bump"
              exit 1
            fi
          }

      - name: Run tests
        run: cargo test --all-features --verbose

      - name: Build release
        run: cargo build --release --all-features --verbose

      - name: Verify package
        run: cargo package --verbose

      - name: Dry run publish
        run: cargo publish --dry-run --allow-dirty

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "Error: CARGO_REGISTRY_TOKEN secret is not set"
            echo "Please configure the secret in GitHub repository settings"
            exit 1
          fi
          cargo publish --token "$CARGO_REGISTRY_TOKEN"

  verify-and-release:
    name: Verify Publication and Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for crates.io propagation
        run: sleep 30

      - name: Verify publication
        run: |
          for i in {1..10}; do
            if cargo search cardano-crypto | grep -q "cardano-crypto ="; then
              echo "✓ Package successfully published to crates.io"
              exit 0
            fi
            echo "Waiting for crates.io to update... ($i/10)"
            sleep 10
          done
          echo "⚠ Publication verification timed out, but package may still be available"

      - name: Generate changelog
        id: changelog
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "## 🎉 Cardano Crypto v${TAG_VERSION}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "Pure Rust implementation of Cardano cryptographic primitives." >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          
          # Extract changelog section for this version
          if [ -f CHANGELOG.md ]; then
            awk '/^## \['"$TAG_VERSION"'\]/, /^## \[/ {if (!/^## \['"$TAG_VERSION"'\]/ && /^## \[/) exit; print}' CHANGELOG.md >> RELEASE_NOTES.md
          fi
          
          echo "" >> RELEASE_NOTES.md
          echo "### 📦 Installation" >> RELEASE_NOTES.md
          echo "\`\`\`toml" >> RELEASE_NOTES.md
          echo "[dependencies]" >> RELEASE_NOTES.md
          echo "cardano-crypto = \"${TAG_VERSION}\"" >> RELEASE_NOTES.md
          echo "\`\`\`" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### 🔗 Links" >> RELEASE_NOTES.md
          echo "- [crates.io](https://crates.io/crates/cardano-crypto)" >> RELEASE_NOTES.md
          echo "- [Documentation](https://docs.rs/cardano-crypto)" >> RELEASE_NOTES.md
          echo "- [Repository](https://github.com/FractionEstate/cardano-crypto)" >> RELEASE_NOTES.md

      - name: Build release artifacts
        run: |
          cargo build --release --all-features
          mkdir -p artifacts
          cp target/release/libcardano_crypto.rlib artifacts/ || true
          tar -czf artifacts/cardano-crypto-${GITHUB_REF#refs/tags/v}.tar.gz -C target/release .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
